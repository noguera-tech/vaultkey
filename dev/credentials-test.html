<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>VaultKey · Credentials Test (herramienta interna)</title>
<!-- HERRAMIENTA INTERNA — NO DESPLEGAR. Sin datos reales. -->
<style>
  body{font-family:system-ui,sans-serif;background:#0F172A;color:#fff;padding:16px;}
  .ok{color:#22C55E;}.bad{color:#EF4444;}
  pre{background:#1e293b;padding:12px;border-radius:8px;white-space:pre-wrap;font-size:13px;}
  button{background:#3B82F6;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<h2>VaultKey · Credentials Test</h2>
<p style="font-size:13px;color:#9CA3AF;">
  Credenciales de prueba → master: <code>MasterFuerte#2026x</code> · PIN: <code>482913</code>
</p>
<button id="run">Ejecutar tests (tarda ~60 s)</button>
<pre id="out">Pulsa «Ejecutar tests».</pre>

<script src="../vault-crypto.js"></script>
<script src="../vault-store.js"></script>
<script src="../credentials.js"></script>
<script>
(function(){
  'use strict';
  var MASTER='MasterFuerte#2026x', NEW_MASTER='NuevaMasterMuyFuerte#2027!';
  var PIN='482913', NEW_PIN='119922';
  var out=document.getElementById('out');
  var pass=0,fail=0,lines=[];
  function t(name,cond){
    if(cond){pass++;lines.push('<span class="ok">✔</span> '+name);}
    else{fail++;lines.push('<span class="bad">✘ FALLO:</span> '+name);}
    out.innerHTML=lines.join('\n');
  }
  function uns(b64){var b=atob(b64),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}

  document.getElementById('run').addEventListener('click', async function(){
    pass=0;fail=0;lines=['Sembrando bóveda (2M iteraciones)…']; out.innerHTML=lines[0];
    await vkStore.wipeLocal();
    var kit=vkCrypto.generateKitCode();
    var payload=JSON.stringify({app:'VaultKey',schemaVersion:2,entries:[]});
    var alta=await vkCrypto.createVaultBlob({master:MASTER,kitCode:kit,payloadStr:payload});
    vkStore.saveBlob(alta.blob);
    var pepper=await vkCrypto.getOrCreatePepper();
    var kek=await vkCrypto.deriveKEK(MASTER,uns(alta.blob.kdf.saltMaster),alta.blob.kdf.iterMaster);
    var raw=await vkCrypto.unwrapDEKRaw(alta.blob.wraps.master,kek);
    var pw=await vkCrypto.createPinWrap(raw,PIN,pepper);
    raw.fill(0); vkStore.savePinWrap(pw); vkStore.setMeta({onboardingDone:true});
    lines.push('Bóveda sembrada. Ejecutando tests…'); out.innerHTML=lines.join('\n');

    // changeMaster OK
    await vkCredentials.changeMaster({store:vkStore,crypto:vkCrypto,currentMaster:MASTER,newMaster:NEW_MASTER});
    var blob=vkStore.loadBlob();
    t('nueva master abre', await vkCrypto.openVaultBlob(blob,{master:NEW_MASTER}).then(()=>true,()=>false));
    t('master antigua no abre', await vkCrypto.openVaultBlob(blob,{master:MASTER}).then(()=>false,()=>true));
    t('kit sigue abriendo', await vkCrypto.openVaultBlob(blob,{kitCode:kit}).then(()=>true,()=>false));
    var p2=await vkCrypto.getOrCreatePepper();
    t('pin-wrap sigue válido', await vkCrypto.openPinWrap(vkStore.loadPinWrap(),PIN,p2).then(()=>true,()=>false));

    // changeMaster master errónea rechaza
    t('changeMaster errónea rechaza', await vkCredentials.changeMaster({store:vkStore,crypto:vkCrypto,currentMaster:'mala',newMaster:'x'}).then(()=>false,()=>true));

    lines.push('Cambiando PIN…'); out.innerHTML=lines.join('\n');

    // changePIN OK
    await vkCredentials.changePIN({store:vkStore,crypto:vkCrypto,master:NEW_MASTER,newPin:NEW_PIN});
    var p3=await vkCrypto.getOrCreatePepper();
    t('nuevo PIN abre', await vkCrypto.openPinWrap(vkStore.loadPinWrap(),NEW_PIN,p3).then(()=>true,()=>false));
    t('PIN anterior no abre', await vkCrypto.openPinWrap(vkStore.loadPinWrap(),PIN,p3).then(()=>false,()=>true));

    // changePIN master errónea rechaza
    t('changePIN master errónea rechaza', await vkCredentials.changePIN({store:vkStore,crypto:vkCrypto,master:'mala',newPin:'000000'}).then(()=>false,()=>true));

    lines.push(''); lines.push('<b>Resultado: '+pass+' correctas, '+fail+' fallos</b>');
    out.innerHTML=lines.join('\n');
    await vkStore.wipeLocal();
  });
})();
</script>
</body>
</html>
