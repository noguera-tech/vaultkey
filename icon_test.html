<title>VaultKey — Test de Iconos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060d1a; color: #e0f0ff; font-family: Arial, sans-serif; padding: 16px; }
h1 { color: #00e5ff; font-size: 18px; margin-bottom: 4px; }
p { color: #4a7090; font-size: 12px; margin-bottom: 16px; }
.stats { background: #0a1628; border: 1px solid #1a3a5c; border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 13px; }
.stats span { color: #00e5ff; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; }
.ic { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ic .box { width: 48px; height: 48px; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.ic .box svg { width: 100%; height: 100%; display: block; }
.ic .lbl { font-size: 9px; color: #4a7090; text-align: center; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ic.shield .box { border: 2px solid #ff4444; }
.ic.initials .box { border: 2px solid #f59e0b; }
.ic.brand .box { border: 2px solid #22c55e; }
.legend { display: flex; gap: 12px; margin-bottom: 12px; font-size: 11px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 10px; height: 10px; border-radius: 2px; }
input { width: 100%; padding: 10px; background: #0a1628; border: 1px solid #1a3a5c; border-radius: 8px; color: #e0f0ff; font-size: 14px; margin-bottom: 12px; outline: none; }
input:focus { border-color: #00e5ff; }
</style>
</head>

<p>Verde = icono de marca | Amarillo = iniciales | Rojo = escudo genérico (falla)</p>

<div class="legend">

<input type="text" id="search" placeholder="Buscar icono..." oninput="filterIcons(this.value)">

function vk128SvgText(label,bg,fg='#fff',fs=18){return {bg,svg:`<svg viewBox="0 0 48 48" width="48" height="48" aria-hidden="true"><rect width="48" height="48" rx="12" fill="${bg}"/><text x="24" y="31" font-size="${fs}" font-weight="900" fill="${fg}" text-anchor="middle" font-family="Arial, sans-serif">${label}</text></svg>`}}
function vk128Match(n,k){k=(k||'').toLowerCase().trim();if(!k)return false;if(k.length<=2)return n===k;return n===k||n.includes(k)}
function vk128Icon(label,bg,fg='#fff',fs=18){return vk128SvgText(label,bg,fg,fs)}

function iconFromKey(id){
  if(!id||id==='auto')return null;
  const ic=MANUAL_ICONS.find(x=>x.id===id);
  if(!ic)return null;
  return {bg:ic.bg||'#0a84ff',label:ic.label||ic.id,id:ic.id};
}
function _iconByServiceName(s){
  if(!s)return null;

}
function iconForEntry(e){
  if(e?.icon&&e.icon!=='auto'){const m=iconFromKey(e.icon);if(m&&m.svg)return m;}
  const byName=_iconByServiceName(e?.service);

  return serviceIcon([e?.service,e?.url,e?.type].filter(Boolean).join(' '));
}

function vkMakeIconSvg(bg, text, fontSize){
  const s=String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return {bg, type:'initials', svg:`<svg viewBox="0 0 48 48" width="48" height="48"><rect width="48" height="48" rx="12" fill="${bg}"/><text x="24" y="32" font-size="${fontSize||20}" font-weight="900" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">${s}</text></svg>`};
}
function vkInitials(label, id){
  const s=String(label||id||'').trim();
  const parts=s.split(/[\s\-_\/]+/).filter(Boolean);
  if(parts.length>=2) return (parts[0][0]+parts[1][0]).toUpperCase();
  return s.slice(0,2).toUpperCase()||'VK';
}
function vkFontSize(text){ const l=String(text||'').length; return l>=4?13:l===3?16:l===2?20:24; }
function vkIsShield(v){ return !v||!v.svg||String(v.bg||'').toLowerCase()==='#061a33'; }

let vkIconMap = null;
function vkBuildIconMap(){
  if(vkIconMap) return;
  vkIconMap = {};
  let brands=0, initials=0, shields=0;
  (MANUAL_ICONS||[]).forEach(function(ic){
    if(!ic||!ic.id||ic.id==='auto') return;
    // Try VK128 with id
    let v=serviceIcon(ic.id);
    if(!vkIsShield(v)){v.type='brand';vkIconMap[ic.id]=v;brands++;return;}
    // Try with label
    v=serviceIcon(String(ic.label||'').toLowerCase());
    if(!vkIsShield(v)){v.type='brand';vkIconMap[ic.id]=v;brands++;return;}
    // Try combined
    v=serviceIcon(ic.id+' '+(ic.label||''));
    if(!vkIsShield(v)){v.type='brand';vkIconMap[ic.id]=v;brands++;return;}
    // Emoji fallback
    const emoji=String(ic.emoji||'').trim();
    if(emoji&&emoji.length<=4&&!/^[A-Za-z]+$/.test(emoji)){
      vkIconMap[ic.id]=vkMakeIconSvg(ic.bg||'#0a84ff',emoji,24);
      initials++;return;
    }
    // Initials fallback
    const txt=vkInitials(ic.label,ic.id);
    vkIconMap[ic.id]=vkMakeIconSvg(ic.bg||'#0a84ff',txt,vkFontSize(txt));
    initials++;
  });
  vkIconMap['auto']={bg:'#0a84ff',type:'brand',svg:'<svg viewBox="0 0 48 48" width="48" height="48"><rect width="48" height="48" rx="12" fill="#0a84ff"/><path d="M17 12l2 6 6 2-6 2-2 6-2-6-6-2 6-2zM31 21l1.5 4.5L37 27l-4.5 1.5L31 33l-1.5-4.5L25 27l4.5-1.5z" fill="#fff"/></svg>'};
  const total=Object.keys(vkIconMap).length;
  byId('stats').innerHTML=`Total: <span>${total}</span> iconos | Marca: <span style="color:#22c55e">${brands}</span> | Iniciales: <span style="color:#f59e0b">${initials}</span> | Escudos: <span style="color:#ff4444">${shields}</span>`;
  return {brands,initials,shields};
}

function renderTestGrid(filter){
  vkBuildIconMap();
  const grid=byId('grid');
  const q=(filter||'').toLowerCase().trim();
  const list=(MANUAL_ICONS||[]).filter(ic=>!q||[ic.id,ic.label,ic.emoji||''].join(' ').toLowerCase().includes(q));
  grid.innerHTML=list.map(ic=>{
    const obj=vkIconMap[ic.id]||{bg:'#061a33',type:'shield',svg:vk128Shield().svg};
    const type=obj.type||'shield';
    const svgStr=obj.svg.replace(/<svg ([^>]*?)width="[^"]*"\s*/g,'<svg $1').replace(/<svg ([^>]*?)height="[^"]*"\s*/g,'<svg $1').replace(/<svg /g,'<svg style="width:100%;height:100%;display:block" ');
    return `<div class="ic ${type}">
      <div class="box" style="background:${obj.bg}">${svgStr}</div>
      <div class="lbl">${safeEsc(ic.label)}</div>
    </div>`;
  }).join('');
}
function filterIcons(q){ renderTestGrid(q); }

window.addEventListener('load', function(){
  setTimeout(function(){
    try{ renderTestGrid(); } catch(e){ byId('stats').textContent='ERROR: '+e.message; }
  }, 100);
});
</script>
